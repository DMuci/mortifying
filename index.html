<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortify.ing</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000; /* Crisp red terminal text */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal-container {
            font-size: 4rem; 
            letter-spacing: 5px;
            text-shadow: 0 0 10px #8b0000;
            font-weight: normal;
            white-space: nowrap;
        }

        /* The Blinking Cursor */
        #cursor {
            display: inline-block;
            background-color: #ff0000;
            width: 25px;
            height: 4rem;
            margin-left: 5px;
            vertical-align: bottom;
            box-shadow: 0 0 10px #8b0000;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 49% { background-color: #ff0000; }
            50%, 100% { background-color: transparent; }
        }

        /* Responsive sizing for mobile */
        @media (max-width: 800px) {
            #terminal-container {
                font-size: 2rem;
                letter-spacing: 3px;
            }
            #cursor {
                width: 12px;
                height: 2rem;
            }
        }
    </style>
</head>
<body>

    <div>
        <span id="terminal-container"></span><span id="cursor"></span>
    </div>

    <script>
        // Add whatever phrases you want to cycle through here
        const phrases = [
            "PATIENCE...",
            "SYSTEM OFFLINE.",
            "CONNECTING...",
            "MORTIFYING."
        ];

        const container = document.getElementById('terminal-container');
        
        let phraseIndex = 0;
        let characterIndex = 0;
        let isDeleting = false;

        // Speed settings (in milliseconds)
        const typeSpeed = 150;    // Time per letter when typing
        const deleteSpeed = 75;   // Time per letter when backspacing
        const waitBeforeDelete = 2500; // How long to display the finished sentence

        function typeLoop() {
            const currentPhrase = phrases[phraseIndex];

            if (!isDeleting) {
                // Typing out
                container.textContent = currentPhrase.substring(0, characterIndex + 1);
                characterIndex++;

                if (characterIndex === currentPhrase.length) {
                    // Pause when the sentence is fully typed
                    setTimeout(() => {
                        isDeleting = true;
                        typeLoop();
                    }, waitBeforeDelete);
                    return;
                }
            } else {
                // Backspacing
                container.textContent = currentPhrase.substring(0, characterIndex - 1);
                characterIndex--;

                if (characterIndex === 0) {
                    isDeleting = false;
                    // Move to the next sentence (loops back to 0 at the end)
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    
                    // Small pause at the completely empty console before typing next line
                    setTimeout(typeLoop, 500);
                    return;
                }
            }

            // Keep the loop moving based on current action state
            setTimeout(typeLoop, isDeleting ? deleteSpeed : typeSpeed);
        }

        // Initialize the console loop
        typeLoop();
    </script>
</body>
</html>
