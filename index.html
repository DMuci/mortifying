<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortify.ing</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #matrix-container {
            /* Doubled from 2rem to 4rem */
            font-size: 4rem; 
            letter-spacing: 10px;
            text-align: center;
            text-shadow: 0 0 12px #8b0000;
            font-weight: bold;
        }

        .shuffling {
            opacity: 0.6;
        }

        .revealed {
            color: #fff;
            text-shadow: 0 0 20px #ff0000;
        }

        /* Mobile adjustment to ensure 4rem doesn't wrap awkwardly */
        @media (max-width: 600px) {
            #matrix-container {
                font-size: 2.5rem;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="matrix-container"></div>

    <script>
        const targetWord = "PATIENCE";
        const container = document.getElementById('matrix-container');
        const zalgoChars = "H̵̛̰Ẻ̵̲L̵̻̆Ḻ̵̅O̵̲͠W̵̰̉I̵̪͗Z̵̺͠0̵̠̈1̵̪̓X̵̩͆Y̵̰̐Z̵̨̍";
        
        let revealedCount = 0;
        let displayArray = new Array(targetWord.length).fill('');

        function getRandomZalgo() {
            return zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
        }

        function updateDisplay() {
            let output = "";
            for (let i = 0; i < targetWord.length; i++) {
                if (i < revealedCount) {
                    output += `<span class="revealed">${targetWord[i]}</span>`;
                } else {
                    output += `<span class="shuffling">${getRandomZalgo()}</span>`;
                }
            }
            container.innerHTML = output;
        }

        // Shuffle speed (kept fast for the effect)
        const shuffleInterval = setInterval(() => {
            updateDisplay();
        }, 80);

        // Reveal loop - Now 30% faster (1050ms instead of 1500ms)
        const revealInterval = setInterval(() => {
            if (revealedCount < targetWord.length) {
                revealedCount++;
            } else {
                clearInterval(revealInterval);
            }
        }, 1050);
    </script>
</body>
</html>
