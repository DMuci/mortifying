<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortify.ing</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #matrix-container {
            font-size: 4rem; 
            letter-spacing: 10px;
            text-shadow: 0 0 12px #8b0000;
            font-weight: normal;
            
            /* STABILIZATION FIXES */
            display: inline-block;
            text-align: left; /* Keep start point fixed */
            min-width: 650px;  /* Keeps the container from snapping sizes */
            white-space: nowrap;
        }

        .shuffling {
            opacity: 0.6;
        }

        .revealed {
            color: #fff;
            text-shadow: 0 0 20px #ff0000;
        }

        /* Adjusting for mobile so it doesn't overflow the screen */
        @media (max-width: 700px) {
            #matrix-container {
                font-size: 2rem;
                min-width: 320px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="matrix-container"></div>

    <script>
        const targetWord = "PATIENCE";
        const container = document.getElementById('matrix-container');
        // Simplified Zalgo set to prevent extreme width variations
        const zalgoChars = "H̵E̵L̵L̵O̵W̵I̵Z̵X̵Y̵Z̵";
        
        let revealedCount = 0;
        let dotCount = 0;
        let isSpelledOut = false;

        function getRandomZalgo() {
            return zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
        }

        function updateDisplay() {
            let output = "";
            
            for (let i = 0; i < targetWord.length; i++) {
                if (i < revealedCount) {
                    output += `<span class="revealed">${targetWord[i]}</span>`;
                } else {
                    output += `<span class="shuffling">${getRandomZalgo()}</span>`;
                }
            }

            if (isSpelledOut) {
                // Using non-breaking spaces for empty dot slots to keep width perfect
                let dots = ".".repeat(dotCount + 1);
                let padding = "&nbsp;".repeat(2 - dotCount); 
                output += `<span class="revealed">${dots}${padding}</span>`;
            } else {
                // Placeholder space for dots while spelling to prevent jump at the end
                output += `&nbsp;&nbsp;&nbsp;`;
            }

            container.innerHTML = output;
        }

        setInterval(() => {
            updateDisplay();
        }, 80);

        const revealInterval = setInterval(() => {
            if (revealedCount < targetWord.length) {
                revealedCount++;
            } else {
                clearInterval(revealInterval);
                isSpelledOut = true;
                startDotLoop();
            }
        }, 1050);

        function startDotLoop() {
            setInterval(() => {
                dotCount = (dotCount + 1) % 3;
            }, 300);
        }
    </script>
</body>
</html>
