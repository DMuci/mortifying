<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortify.ing</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #matrix-container {
            font-size: 4rem; 
            letter-spacing: 10px;
            text-align: center;
            text-shadow: 0 0 12px #8b0000;
            font-weight: normal; /* Removed bold */
        }

        .shuffling {
            opacity: 0.6;
        }

        .revealed {
            color: #fff;
            text-shadow: 0 0 20px #ff0000;
        }

        @media (max-width: 600px) {
            #matrix-container {
                font-size: 2.5rem;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="matrix-container"></div>

    <script>
        const targetWord = "PATIENCE";
        const container = document.getElementById('matrix-container');
        const zalgoChars = "H̵̛̰Ẻ̵̲L̵̻̆Ḻ̵̅O̵̲͠W̵̰̉I̵̪͗Z̵̺͠0̵̠̈1̵̪̓X̵̩͆Y̵̰̐Z̵̨̍";
        
        let revealedCount = 0;
        let dotCount = 0;
        let isSpelledOut = false;

        function getRandomZalgo() {
            return zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
        }

        function updateDisplay() {
            let output = "";
            
            // Build the main word
            for (let i = 0; i < targetWord.length; i++) {
                if (i < revealedCount) {
                    output += `<span class="revealed">${targetWord[i]}</span>`;
                } else {
                    output += `<span class="shuffling">${getRandomZalgo()}</span>`;
                }
            }

            // Handle the dots once the word is finished
            if (isSpelledOut) {
                let dots = ".".repeat(dotCount + 1);
                output += `<span class="revealed">${dots}</span>`;
            }

            container.innerHTML = output;
        }

        // Shuffle visual loop
        setInterval(() => {
            updateDisplay();
        }, 80);

        // Word reveal loop
        const revealInterval = setInterval(() => {
            if (revealedCount < targetWord.length) {
                revealedCount++;
            } else {
                clearInterval(revealInterval);
                isSpelledOut = true;
                startDotLoop();
            }
        }, 1050);

        // Dot cycling loop (. .. ...)
        function startDotLoop() {
            setInterval(() => {
                dotCount = (dotCount + 1) % 3;
            }, 600);
        }
    </script>
</body>
</html>
