<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortify.ing</title>
    <style>
        body {
            background-color: #000;
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #terminal-container {
            font-size: 4rem; 
            letter-spacing: 5px;
            text-shadow: 0 0 10px #8b0000;
            font-weight: normal;
            white-space: nowrap;
        }

        #cursor {
            display: inline-block;
            background-color: #ff0000;
            width: 25px;
            height: 4rem;
            margin-left: 5px;
            vertical-align: bottom;
            box-shadow: 0 0 10px #8b0000;
            animation: blink 0.8s steps(2, start) infinite; /* Snappier terminal blink */
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 800px) {
            #terminal-container {
                font-size: 2rem;
                letter-spacing: 3px;
            }
            #cursor {
                width: 12px;
                height: 2rem;
            }
        }
    </style>
</head>
<body>

    <div>
        <span id="terminal-container"></span><span id="cursor"></span>
    </div>

    <script>
        const phrases = [
            "PATIENCE...",
            "SYSTEM OFFLINE.",
            "CONNECTING...",
            "MORTIFYING."
        ];

        const container = document.getElementById('terminal-container');
        
        let phraseIndex = 0;
        let characterIndex = 0;
        let isDeleting = false;
        
        // Accurate high-fps tracking variables
        let lastTime = 0;
        let accumulator = 0;

        // Speed configurations (in milliseconds)
        const typeSpeed = 120;        
        const deleteSpeed = 50;       
        const waitBeforeDelete = 2500; 
        const waitBeforeType = 500;   
        
        let statePauseTimer = 0;

        function updateTerminal(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // Cap extreme delta spikes (e.g., switching tabs)
            if (deltaTime > 100) deltaTime = 16; 

            if (statePauseTimer > 0) {
                statePauseTimer -= deltaTime;
            } else {
                accumulator += deltaTime;
                
                const currentSpeed = isDeleting ? deleteSpeed : typeSpeed;

                // Process frames perfectly synced to the refresh rate
                while (accumulator >= currentSpeed) {
                    const currentPhrase = phrases[phraseIndex];

                    if (!isDeleting) {
                        container.textContent = currentPhrase.substring(0, characterIndex + 1);
                        characterIndex++;

                        if (characterIndex === currentPhrase.length) {
                            statePauseTimer = waitBeforeDelete;
                            isDeleting = true;
                            accumulator = 0;
                            break;
                        }
                    } else {
                        container.textContent = currentPhrase.substring(0, characterIndex - 1);
                        characterIndex--;

                        if (characterIndex === 0) {
                            statePauseTimer = waitBeforeType;
                            isDeleting = false;
                            phraseIndex = (phraseIndex + 1) % phrases.length;
                            accumulator = 0;
                            break;
                        }
                    }
                    accumulator -= currentSpeed;
                }
            }

            // Request next frame at maximum display capability (e.g., 120Hz)
            requestAnimationFrame(updateTerminal);
        }

        // Kickoff the hardware-accelerated loop
        requestAnimationFrame(updateTerminal);
    </script>
</body>
</html>
